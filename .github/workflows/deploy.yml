name: Deploy to Mint server

on:
  push:
    branches: [master]
  workflow_dispatch:   # allow manual triggering from the Actions tab

# One deploy at a time. Queue follow-ups instead of cancelling — a half-applied
# deploy is worse than a slightly-delayed one.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: [self-hosted, buddiebot-prod]
    timeout-minutes: 10

    steps:
      # BuddieBot's go.mod has `replace` directives pointing at ../bb_data and
      # ../bb_images. The runner only checks out BuddieBot by default, so we
      # have to clone the two siblings into the same workspace at the matching
      # relative paths before `go build` will resolve them.
      - name: Checkout BuddieBot
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: BuddieBot

      - name: Checkout bb_data
        uses: actions/checkout@v4
        with:
          repository: Beamer64/bb_data
          fetch-depth: 1
          path: bb_data

      - name: Checkout bb_images
        uses: actions/checkout@v4
        with:
          repository: Beamer64/bb_images
          fetch-depth: 1
          path: bb_images

      # Production config is the single source of truth in a repository secret.
      # We rewrite /opt/buddiebot/config.yaml from the secret on every deploy,
      # so updating the secret + triggering a deploy is all it takes to change
      # the bot's configuration on the server.
      - name: Write production config from secret
        env:
          BOT_CONFIG_YAML: ${{ secrets.BOT_CONFIG_YAML }}
        run: |
          set -euo pipefail
          if [[ -z "$BOT_CONFIG_YAML" ]]; then
            echo "ERROR: repo secret BOT_CONFIG_YAML is empty or missing" >&2
            exit 1
          fi
          umask 077
          printf '%s' "$BOT_CONFIG_YAML" > /opt/buddiebot/config.yaml
          chmod 600 /opt/buddiebot/config.yaml

      - name: Run deploy script
        working-directory: BuddieBot
        run: ./scripts/deploy.sh
        env:
          BUILD_ROOT: /opt/buddiebot
          KEEP: 3
          GO_BIN: /usr/local/go/bin/go
